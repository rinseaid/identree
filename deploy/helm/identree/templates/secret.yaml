{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "identree.fullname" . }}
  labels:
    {{- include "identree.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secrets.sharedSecret }}
  IDENTREE_SHARED_SECRET: {{ .Values.secrets.sharedSecret | quote }}
  {{- end }}
  {{- if .Values.secrets.oidcClientSecret }}
  IDENTREE_OIDC_CLIENT_SECRET: {{ .Values.secrets.oidcClientSecret | quote }}
  {{- end }}
  {{- if .Values.secrets.pocketidApiKey }}
  IDENTREE_POCKETID_API_KEY: {{ .Values.secrets.pocketidApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.hmacSecret }}
  IDENTREE_HMAC_SECRET: {{ .Values.secrets.hmacSecret | quote }}
  {{- end }}
  {{- if .Values.secrets.metricsToken }}
  IDENTREE_METRICS_TOKEN: {{ .Values.secrets.metricsToken | quote }}
  {{- end }}
  {{- if .Values.secrets.apiKeys }}
  IDENTREE_API_KEYS: {{ .Values.secrets.apiKeys | quote }}
  {{- end }}
  {{- if .Values.secrets.ldapBindPassword }}
  IDENTREE_LDAP_BIND_PASSWORD: {{ .Values.secrets.ldapBindPassword | quote }}
  {{- end }}
  {{- if .Values.secrets.notifyToken }}
  IDENTREE_NOTIFY_TOKEN: {{ .Values.secrets.notifyToken | quote }}
  {{- end }}
  {{- if .Values.secrets.auditSplunkToken }}
  IDENTREE_AUDIT_SPLUNK_TOKEN: {{ .Values.secrets.auditSplunkToken | quote }}
  {{- end }}
  {{- if .Values.secrets.auditLokiToken }}
  IDENTREE_AUDIT_LOKI_TOKEN: {{ .Values.secrets.auditLokiToken | quote }}
  {{- end }}
  {{- if .Values.secrets.escrowAuthSecret }}
  IDENTREE_ESCROW_AUTH_SECRET: {{ .Values.secrets.escrowAuthSecret | quote }}
  {{- end }}
  {{- if .Values.secrets.escrowAuthSecretFile }}
  IDENTREE_ESCROW_AUTH_SECRET_FILE: {{ .Values.secrets.escrowAuthSecretFile | quote }}
  {{- end }}
  {{- if .Values.secrets.escrowEncryptionKey }}
  IDENTREE_ESCROW_ENCRYPTION_KEY: {{ .Values.secrets.escrowEncryptionKey | quote }}
  {{- end }}
  {{- if .Values.secrets.escrowHkdfSalt }}
  IDENTREE_ESCROW_HKDF_SALT: {{ .Values.secrets.escrowHkdfSalt | quote }}
  {{- end }}
  {{- if .Values.secrets.webhookSecret }}
  IDENTREE_WEBHOOK_SECRET: {{ .Values.secrets.webhookSecret | quote }}
  {{- end }}
{{- end }}
