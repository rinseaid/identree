{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "identree.fullname" . }}
spec:
  podSelector:
    matchLabels:
      {{- include "identree.selectorLabels" . | nindent 6 }}
  policyTypes: [Ingress, Egress]
  ingress:
    - ports:
        - port: 8090
          protocol: TCP
        {{- if .Values.config.ldap.enabled }}
        - port: 389
          protocol: TCP
        {{- if .Values.ldapsService.enabled }}
        - port: 636
          protocol: TCP
        {{- end }}
        {{- end }}
  egress:
    - {} # Allow all egress (OIDC, PocketID, Postgres, escrow backends)
{{- end }}
