  # ── History ────���────────────────────────────────────────────────────────

  /api/history/export:
    get:
      operationId: exportHistory
      summary: Export action history as CSV
      tags: [Dashboard]
      security:
        - sessionCookie: []
      parameters:
        - name: user
          in: query
          schema:
            type: string
          description: Filter by username (admin only).
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: CSV file download.
          content:
            text/csv: {}
        "401":
          description: Unauthorized.

  # ── Webhooks ───────��────────────────────────────────────────────────────

  /api/webhook/pocketid:
    post:
      operationId: pocketIDWebhook
      summary: Receive PocketID directory change webhook
      description: >
        Validates X-Webhook-Signature HMAC-SHA256, then queues an LDAP refresh.
      tags: [Webhooks]
      security:
        - webhookSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: PocketID webhook event payload (opaque to identree).
      responses:
        "204":
          description: Accepted and refresh queued.
        "403":
          description: Invalid or missing webhook signature.
        "415":
          description: Content-Type not application/json.

  # ── Health & Metrics ────────────────────────────────────────���───────────

  /healthz:
    get:
      operationId: healthz
      summary: Health check
      tags: [Health]
      responses:
        "200":
          description: Healthy or degraded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthzResponse"
        "503":
          description: Unhealthy (disk not writable, LDAP stale, or LDAP not started).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthzResponse"

  /metrics:
    get:
      operationId: metrics
      summary: Prometheus metrics
      tags: [Health]
      security:
        - metricsToken: []
      parameters:
        - name: token
          in: query
          required: false
          schema:
            type: string
          description: Alternative to Authorization header for metrics token.
      responses:
        "200":
          description: Prometheus text exposition format.
          content:
            text/plain: {}
        "401":
          description: Invalid or missing metrics token (when configured).

