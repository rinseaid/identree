openapi: 3.1.0
info:
  title: identree API
  description: >
    identree bridges PAM sudo challenges to an OIDC identity provider, serves
    an admin dashboard, exposes an LDAP directory, and manages break-glass
    password escrow. This specification covers all HTTP API endpoints.
  version: 0.1.0
  license:
    name: MIT

servers:
  - url: "{scheme}://{host}"
    variables:
      scheme:
        default: https
        enum: [http, https]
      host:
        default: identree.example.com

# ---------------------------------------------------------------------------
# Security schemes
# ---------------------------------------------------------------------------
security: []

components:
  securitySchemes:
    sharedSecret:
      type: apiKey
      in: header
      name: X-Shared-Secret
      description: >
        Global shared secret or per-host secret from the host registry.
        Used by PAM clients for challenge creation, polling, grace-status,
        escrow, and client provisioning.

    sessionCookie:
      type: apiKey
      in: cookie
      name: identree_session
      description: >
        HMAC-signed session cookie set after OIDC login.
        Used by browser-based dashboard and admin endpoints.
        Most mutating endpoints also require CSRF token fields.

    bearerToken:
      type: http
      scheme: bearer
      description: >
        API key passed as `Authorization: Bearer <key>`.
        Configured via IDENTREE_API_KEYS. Used for programmatic access.

    metricsToken:
      type: http
      scheme: bearer
      description: >
        Metrics scrape token set via IDENTREE_METRICS_TOKEN.
        Can also be passed as `?token=<value>` query parameter.

    webhookSignature:
      type: apiKey
      in: header
      name: X-Webhook-Signature
      description: >
        HMAC-SHA256 signature computed over the request body using
        IDENTREE_WEBHOOK_SECRET. Used by PocketID webhook events.

  schemas:
    # -- Core domain types --------------------------------------------------

    ChallengeStatus:
      type: string
      enum: [pending, approved, denied, expired]

    Challenge:
      type: object
      properties:
        id:
          type: string
          description: 32-character hex challenge ID.
        user_code:
          type: string
          description: Short human-readable approval code.
        username:
          type: string
        status:
          $ref: "#/components/schemas/ChallengeStatus"
        hostname:
          type: string
        reason:
          type: string
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time

    ActionLogEntry:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        action:
          type: string
          description: >
            One of: approved, rejected, auto_approved, revoked, extended,
            elevated, rotated_breakglass, revealed_breakglass, removed_host,
            user_removed, rotation_requested, deployed, config_changed,
            sudo_rule_modified, server_restarted, claims_updated.
        hostname:
          type: string
        code:
          type: string
        actor:
          type: string
        reason:
          type: string

    GraceSession:
      type: object
      properties:
        username:
          type: string
        hostname:
          type: string
        expires_at:
          type: string
          format: date-time

    EscrowRecord:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        item_id:
          type: string
        vault_id:
          type: string

    WebhookData:
      type: object
      description: Payload sent to configured notification webhook endpoints.
      properties:
        event:
          type: string
          description: >
            Event type: challenge_created, challenge_approved,
            challenge_rejected, auto_approved, session_revoked,
            sessions_revoked_bulk, grace_elevated,
            breakglass_rotation_requested, revealed_breakglass,
            host_removed, user_removed, config_changed, test.
        username:
          type: string
        hostname:
          type: string
        user_code:
          type: string
        approval_url:
          type: string
        onetap_url:
          type: string
        expires_in:
          type: integer
        timestamp:
          type: string
          format: date-time
        reason:
          type: string
        actor:
          type: string

    AuditEvent:
      type: object
      description: Structured audit record emitted to SIEM sinks.
      properties:
        timestamp:
          type: string
          format: date-time
        event:
          type: string
        username:
          type: string
        hostname:
          type: string
        code:
          type: string
        actor:
          type: string
        reason:
          type: string
        source:
          type: string
          description: Always "identree".
        version:
          type: string

    ClientConfig:
      type: object
      description: Server-side client configuration overrides returned in challenge responses.
      properties:
        poll_interval:
          type: string
          description: Duration string (e.g. "2s").
        timeout:
          type: string
          description: Duration string (e.g. "5m").
        breakglass_enabled:
          type: boolean
        breakglass_password_type:
          type: string
        breakglass_rotation_days:
          type: integer
        token_cache_enabled:
          type: boolean

    HealthzResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded, unhealthy]
        checks:
          type: object
          properties:
            disk:
              type: string
              enum: [ok, not_writable]
            ldap_sync:
              type: string
              enum: [ok, stale]
            pocketid:
              type: string
              enum: [ok, unreachable]
            oidc:
              type: string
              enum: [ok, unreachable]
            ldap_server:
              type: string
              enum: [ok, not_started]

    ProvisionResponse:
      type: object
      properties:
        ldap_url:
          type: string
        base_dn:
          type: string
        bind_dn:
          type: string
        bind_password:
          type: string
        tls_ca_cert:
          type: string
        client_cert:
          type: string
          description: PEM-encoded mTLS client certificate (when mTLS CA is configured).
        client_key:
          type: string
          description: PEM-encoded mTLS client private key (when mTLS CA is configured).
        ca_cert:
          type: string
          description: PEM-encoded mTLS CA certificate for server verification.
        cert_serial:
          type: string
          description: Hex-encoded serial number of the issued client certificate.

    SudoRule:
      type: object
      properties:
        group:
          type: string
        hosts:
          type: string
        commands:
          type: string
        run_as_user:
          type: string
        run_as_group:
          type: string
        options:
          type: string

    Channel:
      type: object
      properties:
        name:
          type: string
          description: Unique channel name.
        backend:
          type: string
          description: "Notification backend type (e.g. slack, discord, generic)."
        url:
          type: string
          description: Webhook URL for the channel.
        timeout:
          type: string
          description: "HTTP timeout duration (e.g. \"5s\")."

    Route:
      type: object
      properties:
        channels:
          type: string
          description: Comma-separated list of channel names.
        events:
          type: string
          description: Comma-separated list of event types to match.
        hosts:
          type: string
          description: Comma-separated host patterns to match.
        users:
          type: string
          description: Comma-separated usernames to match.

    Error:
      type: object
      properties:
        error:
          type: string

    Policy:
      type: object
      properties:
        name:
          type: string
          description: Unique policy name.
        match_hosts:
          type: array
          items:
            type: string
          description: Hostname glob patterns to match.
        match_host_groups:
          type: array
          items:
            type: string
          description: Host registry group labels to match.
        match_users:
          type: array
          items:
            type: string
          description: Username patterns to match.
        require_admin:
          type: boolean
          description: Require the approver to be an admin.
        min_approvals:
          type: integer
          description: >
            Number of approvals required before the challenge resolves (N-of-M quorum).
            0 or 1 means single approval. Values > 1 enable partial approval tracking.
        auto_approve_grace:
          type: boolean
          description: Allow grace-period auto-approval for matching challenges.
        allowed_hours:
          type: string
          description: "Time-of-day window in UTC (e.g. \"09:00-17:00\"). Supports wrap-around."
        allowed_days:
          type: string
          description: "Day-of-week constraint (e.g. \"Mon-Fri\" or \"Mon,Wed,Fri\")."
        require_fresh_oidc:
          type: string
          description: >
            Go duration string (e.g. "5m", "1h"). Approver must have authenticated
            via OIDC within this duration for their approval to be accepted.
        break_glass_bypass:
          type: boolean
          description: >
            When true, admins can force-approve challenges matching this policy via
            /api/challenges/override, bypassing all policy checks. All overrides are audited.
        notify_channels:
          type: array
          items:
            type: string
          description: >
            Channel names (from notification-channels.json) that receive notifications
            for events matching this policy.

# ---------------------------------------------------------------------------
# Tags
# ---------------------------------------------------------------------------
tags:
  - name: Challenges
    description: Create, poll, approve, reject, and manage sudo challenges.
  - name: Sessions
    description: Manage grace-period sessions (revoke, extend, elevate).
  - name: Breakglass
    description: Break-glass password escrow and reveal.
  - name: Admin
    description: Admin-only endpoints for users, groups, config, and operations.
  - name: Deploy
    description: Remote SSH deploy, remove, and stream operations.
  - name: LDAP
    description: LDAP client provisioning and mTLS client certificate issuance.
  - name: Health
    description: Health checks and metrics.
  - name: Downloads
    description: Binary downloads, install scripts, and systemd units.
  - name: Webhooks
    description: Incoming webhook receivers.
  - name: Notifications
    description: Notification channel and routing rule management.
  - name: SudoRules
    description: Sudo rule management (bridge mode only).
  - name: Policies
    description: Approval policy management.
  - name: Dashboard
    description: Browser-facing pages and utilities.

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:

  # ── Challenges ──────────────────────────────────────────────────────────

  /api/challenge:
    post:
      operationId: createChallenge
      summary: Create a sudo challenge
      tags: [Challenges]
      security:
        - sharedSecret: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username]
              properties:
                username:
                  type: string
                hostname:
                  type: string
                reason:
                  type: string
                  description: Optional justification for sudo access.
      responses:
        "201":
          description: Challenge created (may be auto-approved if within grace period).
          content:
            application/json:
              schema:
                type: object
                properties:
                  challenge_id:
                    type: string
                  user_code:
                    type: string
                  verification_url:
                    type: string
                  expires_in:
                    type: integer
                  status:
                    type: string
                    description: Present and set to "approved" when auto-approved.
                  approval_token:
                    type: string
                    description: HMAC token for client-side verification (auto-approved only).
                  grace_remaining:
                    type: integer
                    description: Seconds remaining in grace session (auto-approved only).
                  notification_queued:
                    type: boolean
                  rotate_breakglass_before:
                    type: string
                    format: date-time
                  revoke_tokens_before:
                    type: string
                    format: date-time
                  client_config:
                    $ref: "#/components/schemas/ClientConfig"
        "400":
          description: Invalid request body or username format.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Invalid shared secret.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "415":
          description: Content-Type not application/json.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Justification required but not provided.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    const: justification_required
                  justification_choices:
                    type: array
                    items:
                      type: string
        "429":
          description: Rate limit exceeded or too many auth failures.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/challenge/{id}:
    get:
      operationId: pollChallenge
      summary: Poll challenge status
      tags: [Challenges]
      security:
        - sharedSecret: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: "^[0-9a-f]{32}$"
        - name: hostname
          in: query
          required: false
          schema:
            type: string
          description: Must match the challenge's origin hostname.
      responses:
        "200":
          description: Current challenge status.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    $ref: "#/components/schemas/ChallengeStatus"
                  expires_in:
                    type: integer
                  approval_token:
                    type: string
                    description: Present when status is "approved".
                  denial_token:
                    type: string
                    description: Present when status is "denied".
                  id_token:
                    type: string
                    description: Raw OIDC ID token (approved only, when token cache enabled).
                  grace_remaining:
                    type: integer
                    description: Grace period seconds remaining (approved only).
                  required_approvals:
                    type: integer
                    description: >
                      Total approvals required. Only present when the challenge
                      requires more than one approval (multi-approval policy).
                  current_approvals:
                    type: integer
                    description: >
                      Number of approvals received so far. Only present when
                      required_approvals is present.
                  approvers:
                    type: array
                    items:
                      type: string
                    description: >
                      Usernames of approvers who have approved so far. Only
                      present when required_approvals is present.
        "400":
          description: Invalid challenge ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Hostname mismatch or credential does not match.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "410":
          description: Challenge expired or not found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    const: expired

  /api/challenges/approve:
    post:
      operationId: approveChallenge
      summary: Approve a pending challenge from the dashboard
      tags: [Challenges]
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [username, csrf_token, csrf_ts, challenge_id]
              properties:
                username:
                  type: string
                csrf_token:
                  type: string
                csrf_ts:
                  type: string
                challenge_id:
                  type: string
                reason:
                  type: string
      responses:
        "303":
          description: Redirect to dashboard with flash message.
        "400":
          description: Invalid request.
        "403":
          description: CSRF failure or admin approval required.
        "404":
          description: Challenge not found or already resolved.
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/challenges/approve-all:
    post:
      operationId: approveAllChallenges
      summary: Approve all pending challenges for the user
      tags: [Challenges]
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [username, csrf_token, csrf_ts]
              properties:
                username:
                  type: string
                csrf_token:
                  type: string
                csrf_ts:
                  type: string
      responses:
        "303":
          description: Redirect to dashboard with flash message.

  /api/challenges/reject:
    post:
      operationId: rejectChallenge
      summary: Reject a pending challenge
      tags: [Challenges]
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [username, csrf_token, csrf_ts, challenge_id]
              properties:
                username:
                  type: string
                csrf_token:
                  type: string
                csrf_ts:
                  type: string
                challenge_id:
                  type: string
      responses:
        "303":
          description: Redirect to dashboard with flash message.
        "404":
          description: Challenge not found or already resolved.

  /api/challenges/reject-all:
    post:
      operationId: rejectAllChallenges
      summary: Reject all pending challenges for the user
      tags: [Challenges]
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [username, csrf_token, csrf_ts]
              properties:
                username:
                  type: string
                csrf_token:
                  type: string
                csrf_ts:
                  type: string
      responses:
        "303":
          description: Redirect to dashboard with flash message.

  /api/challenges/override:
    post:
      operationId: overrideChallenge
      summary: Break-glass override — force-approve a challenge bypassing policy checks
      description: >
        Allows an admin to force-approve a pending challenge when the matching
        policy has `break_glass_bypass` enabled. All overrides are audited.
      tags: [Challenges]
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [challenge_id, username, csrf_token, csrf_ts]
              properties:
                challenge_id:
                  type: string
                  description: ID of the pending challenge to override.
                username:
                  type: string
                  description: Username of the admin performing the override.
                csrf_token:
                  type: string
                csrf_ts:
                  type: string
      responses:
        "303":
          description: Redirect to dashboard on successful override.
        "403":
          description: >
            Caller is not an admin, the matching policy does not have
            `break_glass_bypass` enabled, or the challenge does not allow override.

  /api/onetap/{token}:
    get:
      operationId: oneTapConfirm
      summary: Render one-tap approval confirmation page
      tags: [Challenges]
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
          description: "Format: {challenge_id}.{expires_unix}.{hmac_hex}"
      responses:
        "200":
          description: HTML confirmation page.
          content:
            text/html: {}
        "403":
          description: Invalid or expired token.
        "410":
          description: Challenge expired.
    post:
      operationId: oneTapApprove
      summary: Approve a challenge via one-tap link
      tags: [Challenges]
      security:
        - sessionCookie: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [username, csrf_token, csrf_ts, token]
              properties:
                username:
                  type: string
                csrf_token:
                  type: string
                csrf_ts:
                  type: string
                token:
                  type: string
                reason:
                  type: string
      responses:
        "200":
          description: HTML success page.
          content:
            text/html: {}
        "403":
          description: Invalid CSRF or unauthorized.
        "409":
          description: Challenge already resolved.

  # ── Grace status ────────────────────────────────────────────────────────

  /api/grace-status:
    get:
      operationId: getGraceStatus
      summary: Get grace period remaining for a user@host
      tags: [Sessions]
      security:
        - sharedSecret: []
      parameters:
        - name: username
          in: query
          required: true
          schema:
            type: string
        - name: hostname
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Grace period status.
          content:
            application/json:
              schema:
                type: object
                properties:
                  grace_remaining:
                    type: integer
                    description: Seconds remaining in grace period.
                  revoke_tokens_before:
                    type: string
                    format: date-time
                    description: Present when token revocation is active.
        "400":
          description: Missing or invalid username/hostname.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Hostname mismatch.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Sessions ───────��────────────────────────────────────────────────────

  /api/sessions/revoke:
    post:
      operationId: revokeSession
      summary: Revoke a grace session
      tags: [Sessions]
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [username, csrf_token, csrf_ts, hostname]
              properties:
                username:
                  type: string
                csrf_token:
                  type: string
                csrf_ts:
                  type: string
                hostname:
                  type: string
                session_username:
                  type: string
                  description: Admin-only. Target user whose session to revoke.
                from:
                  type: string
                  description: Redirect destination after action.
      responses:
        "303":
          description: Redirect with flash message.
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/sessions/revoke-all:
    post:
      operationId: revokeAllSessions
      summary: Revoke all active grace sessions
      tags: [Sessions]
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [username, csrf_token, csrf_ts]
              properties:
                username:
                  type: string
                csrf_token:
                  type: string
                csrf_ts:
                  type: string
                session_username:
                  type: string
                  description: Admin-only. Specific user to revoke, or omit for all users.
                from:
                  type: string
      responses:
        "303":
          description: Redirect with flash message.

  /api/sessions/extend:
    post:
      operationId: extendSession
      summary: Extend a grace session
      tags: [Sessions]
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [username, csrf_token, csrf_ts, hostname]
              properties:
                username:
                  type: string
                csrf_token:
                  type: string
                csrf_ts:
                  type: string
                hostname:
                  type: string
                session_username:
                  type: string
                  description: Admin-only. Target user whose session to extend.
                duration:
                  type: string
                  description: Duration in seconds, or "max" for full grace period.
                from:
                  type: string
      responses:
        "303":
          description: Redirect with flash message.
        "404":
          description: No active session found.

  /api/sessions/extend-all:
    post:
      operationId: extendAllSessions
      summary: Extend all active grace sessions to max duration
      tags: [Sessions]
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [username, csrf_token, csrf_ts]
              properties:
                username:
                  type: string
                csrf_token:
                  type: string
                csrf_ts:
                  type: string
                session_username:
                  type: string
                  description: Admin-only. Specific user to extend.
                from:
                  type: string
      responses:
        "303":
          description: Redirect with flash message.

  /api/hosts/elevate:
    post:
      operationId: elevateHost
      summary: Create a grace session for a host manually
      tags: [Sessions]
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [username, csrf_token, csrf_ts, hostname, duration]
              properties:
                username:
                  type: string
                csrf_token:
                  type: string
                csrf_ts:
                  type: string
                hostname:
                  type: string
                duration:
                  type: string
                  description: Duration in seconds (clamped to [1h, grace_period]).
                target_user:
                  type: string
                  description: Admin-only. User to elevate (defaults to self).
                from:
                  type: string
      responses:
        "303":
          description: Redirect with flash message.
        "403":
          description: Not authorized or account disabled.

  # ── Breakglass ──────────���────────────────────────���──────────────────────

  /api/breakglass/escrow:
    post:
      operationId: breakglassEscrow
      summary: Escrow a break-glass password
      tags: [Breakglass]
      security:
        - sharedSecret: []
      parameters:
        - name: X-Escrow-Ts
          in: header
          required: false
          schema:
            type: string
          description: Unix timestamp for HMAC escrow token (non-registry mode).
        - name: X-Escrow-Token
          in: header
          required: false
          schema:
            type: string
          description: HMAC token binding escrow to hostname and timestamp.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hostname, password]
              properties:
                hostname:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Password escrowed successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    const: ok
        "400":
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Invalid credential for hostname or escrow token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "410":
          description: Escrow token already used (replay protection).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "501":
          description: Escrow not configured on server.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/breakglass/reveal:
    post:
      operationId: breakglassReveal
      summary: Reveal an escrowed break-glass password
      description: Admin-only. Requires JSON admin auth (session + CSRF headers).
      tags: [Breakglass]
      security:
        - sessionCookie: []
      parameters:
        - name: X-CSRF-Token
          in: header
          required: true
          schema:
            type: string
        - name: X-CSRF-Ts
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hostname]
              properties:
                hostname:
                  type: string
      responses:
        "200":
          description: Password revealed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  password:
                    type: string
                  escrowed_at:
                    type: string
                    format: date-time
        "400":
          description: Invalid hostname.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: No escrow record for host.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "501":
          description: No escrow backend configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Host rotation ───────────────────────────────────────────────────────

  /api/hosts/rotate:
    post:
      operationId: rotateHost
