      operationId: downloadBinaryAmd64
      summary: Download identree binary (linux/amd64)
      tags: [Downloads]
      responses:
        "200":
          description: Binary file.
          content:
            application/octet-stream: {}
        "404":
          description: Binary not available on this server.

  /download/identree-linux-arm64:
    get:
      operationId: downloadBinaryArm64
      summary: Download identree binary (linux/arm64)
      tags: [Downloads]
      responses:
        "200":
          description: Binary file.
          content:
            application/octet-stream: {}
        "404":
          description: Binary not available on this server.

  /download/identree-linux-amd64.sha256:
    get:
      operationId: downloadChecksumAmd64
      summary: Download SHA-256 checksum for linux/amd64 binary
      tags: [Downloads]
      responses:
        "200":
          description: Checksum in "hash  filename" format.
          content:
            text/plain: {}
        "404":
          description: Binary not available.

  /download/identree-linux-arm64.sha256:
    get:
      operationId: downloadChecksumArm64
      summary: Download SHA-256 checksum for linux/arm64 binary
      tags: [Downloads]
      responses:
        "200":
          description: Checksum in "hash  filename" format.
          content:
            text/plain: {}
        "404":
          description: Binary not available.

  /download/systemd/{unit}:
    get:
      operationId: downloadSystemdUnit
      summary: Download embedded systemd unit file
      tags: [Downloads]
      parameters:
        - name: unit
          in: path
          required: true
          schema:
            type: string
            enum:
              - identree-rotate.service
              - identree-rotate.timer
      responses:
        "200":
          description: Systemd unit file.
          content:
            text/plain: {}
        "404":
          description: Unknown unit name.

  # ── Avatar proxy ────────────────────────────────────────────────────────

  /api/avatar:
    get:
      operationId: avatarProxy
      summary: Proxy a user avatar image (SSRF-safe)
      tags: [Dashboard]
      parameters:
        - name: url
          in: query
          required: true
          schema:
            type: string
            format: uri
          description: Avatar URL to fetch (must be http/https, no private IPs).
      responses:
        "200":
          description: Proxied image.
          content:
            image/*: {}
        "400":
          description: Invalid URL or not an image.
        "404":
          description: Upstream returned non-200 or URL missing.

  # ── Dashboard pages (HTML) ─────���────────────────────────────────────────

  /:
