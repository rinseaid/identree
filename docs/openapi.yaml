  # ── Deploy ──────���────────────────────────────────��──────────────────────

  /api/deploy:
    post:
      operationId: startDeploy
      summary: Start an SSH remote-install job
      tags: [Deploy]
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hostname, private_key]
              properties:
                hostname:
                  type: string
                port:
                  type: integer
                  default: 22
                ssh_user:
                  type: string
                  default: root
                private_key:
                  type: string
                  description: SSH private key (PEM format). Never stored.
                pocketid_user:
                  type: string
                  description: Informational only.
      responses:
        "200":
          description: Deploy job started.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Job ID for streaming output.
        "400":
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized (admin only).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Per-IP rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Too many concurrent deploys.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/deploy/stream/{id}:
    get:
      operationId: deployStream
      summary: Stream deploy job output (SSE)
      tags: [Deploy]
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: SSE event stream. Data events contain output lines; a final "status" event carries "done" or "failed".
          content:
            text/event-stream: {}
        "400":
          description: Invalid job ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Only the initiating admin may stream this job.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Job not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/deploy/pubkey:
    post:
      operationId: deployPubkey
      summary: Validate an SSH private key and return its fingerprint
      tags: [Deploy]
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [private_key]
              properties:
                private_key:
                  type: string
      responses:
        "200":
          description: Key info.
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                    description: SSH key type (e.g. ssh-ed25519).
                  fingerprint:
                    type: string
                    description: SHA256 fingerprint.
        "400":
          description: Invalid key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/deploy/users:
    get:
      operationId: deployUsers
      summary: List PocketID users with SSH public keys
      tags: [Deploy]
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Array of users with SSH keys.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    username:
                      type: string
                    email:
                      type: string
                    ssh_keys:
                      type: array
                      items:
                        type: string
        "401":
          description: Unauthorized (admin only).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/deploy/remove:
    post:
      operationId: removeDeploy
      summary: SSH into a host and run uninstall script, then remove from store
      tags: [Deploy]
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hostname, private_key]
              properties:
                hostname:
                  type: string
                port:
                  type: integer
                  default: 22
                ssh_user:
                  type: string
                  default: root
                private_key:
                  type: string
                unconfigure_pam:
                  type: boolean
                remove_files:
                  type: boolean
      responses:
        "200":
          description: Removal job started.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
        "400":
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Rate limited.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Too many concurrent deploys.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/deploy/uninstall-script:
    get:
      operationId: getUninstallScript
      summary: Get rendered uninstall shell script
      tags: [Deploy]
      parameters:
        - name: pam
          in: query
          schema:
            type: string
            enum: ["true", "false"]
          description: Whether to unconfigure PAM (default true).
        - name: files
          in: query
          schema:
            type: string
            enum: ["true", "false"]
          description: Whether to remove binary and config files (default true).
      responses:
        "200":
          description: Shell script.
          content:
            text/x-shellscript: {}

  /api/hosts/remove-host:
    post:
      operationId: removeHost
      summary: Remove a host from identree store (no SSH cleanup)
      tags: [Deploy]
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hostname]
              properties:
                hostname:
                  type: string
      responses:
        "200":
          description: Host removed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    const: ok
        "400":
          description: Invalid hostname.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized (admin only).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── LDAP Provisioning ─────��─────────────────────────────────────────────

  /api/client/provision:
    get:
      operationId: clientProvision
      summary: Get LDAP configuration for client host auto-provisioning
      description: >
        Returns LDAP URL, base DN, per-host bind DN/password, optional TLS
        CA cert, and (when mTLS is enabled) a signed client certificate and
        private key for mutual TLS authentication to the LDAPS endpoint.
        Only active when IDENTREE_LDAP_PROVISION_ENABLED=true.
      tags: [LDAP]
      security:
        - sharedSecret: []
      parameters:
        - name: X-Hostname
          in: header
          required: true
          schema:
            type: string
          description: Client hostname for per-host bind credential derivation.
      responses:
        "200":
          description: LDAP provisioning data.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProvisionResponse"
        "400":
          description: Missing or invalid X-Hostname header.
        "401":
          description: Unauthorized.
        "403":
          description: Hostname not registered or not permitted.
        "404":
          description: Provisioning not enabled.
        "500":
          description: Server misconfigured (missing secret, base DN, or LDAP URL).

  # ── Approval Policies ───────────────────────────────────────────────────

  /api/policies/add:
    post:
      operationId: addPolicy
      summary: Create or update an approval policy
      tags: [Policies]
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [username, csrf_token, csrf_ts]
              properties:
                username:
                  type: string
                csrf_token:
                  type: string
                csrf_ts:
                  type: string
                name:
                  type: string
                  description: Policy name.
                hosts:
                  type: string
                  description: Comma-separated host patterns.
                users:
                  type: string
                  description: Comma-separated usernames.
                action:
                  type: string
                  description: Policy action (e.g. auto_approve, require_admin).
                schedule:
                  type: string
                  description: Time-of-day constraint (e.g. "09:00-17:00").
                min_approvals:
                  type: integer
                  description: Number of approvals required (N-of-M quorum). 0 or 1 = single approval.
                require_fresh_oidc:
                  type: string
                  description: "Go duration (e.g. \"5m\"). Approver must have OIDC-authenticated within this window."
                break_glass_bypass:
                  type: string
                  enum: ["true", "false"]
                  description: Allow admin break-glass override for challenges matching this policy.
                notify_channels:
                  type: string
                  description: Comma-separated channel names for per-policy notification routing.
      responses:
        "303":
          description: Redirect to approval policies page.
        "400":
          description: Invalid or missing form fields.

  /api/policies/delete:
    post:
      operationId: deletePolicy
      summary: Delete an approval policy
      tags: [Policies]
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [username, csrf_token, csrf_ts, policy_name]
              properties:
                username:
                  type: string
                csrf_token:
                  type: string
                csrf_ts:
                  type: string
                policy_name:
                  type: string
                  description: Name of the policy to delete.
      responses:
        "303":
          description: Redirect to approval policies page.
        "404":
          description: Policy not found.

