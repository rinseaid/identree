            text/html: {}

  /admin/groups:
    get:
      operationId: adminGroups
      summary: Group management page
      tags: [Admin]
      security:
        - sessionCookie: []
      responses:
        "200":
          description: HTML group management page.
          content:
            text/html: {}

  /admin/hosts:
    get:
      operationId: adminHosts
      summary: Host management page
      tags: [Admin]
      security:
        - sessionCookie: []
      responses:
        "200":
          description: HTML host management page.
          content:
            text/html: {}

  /admin/sudo-rules:
    get:
      operationId: adminSudoRules
      summary: Sudo rules page (bridge mode only)
      tags: [SudoRules]
      security:
        - sessionCookie: []
      responses:
        "200":
          description: HTML sudo rules page.
          content:
            text/html: {}
        "303":
          description: Redirect if not in bridge mode.

  /api/policy/preview:
    get:
      operationId: policyPreview
      summary: Dry-run policy evaluation
      description: >
        Evaluates the approval policy engine for a given host and user
        without creating a challenge. Returns the effective policy settings
        that would apply if the user requested sudo on the specified host.
      tags: [Policies]
      security:
        - sessionCookie: []
        - sharedSecret: []
      parameters:
        - name: host
          in: query
          required: true
          schema:
            type: string
          description: Target hostname to evaluate.
        - name: user
          in: query
          required: true
          schema:
            type: string
          description: Username requesting access.
      responses:
        "200":
          description: Effective policy for the host/user combination.
          content:
            application/json:
              schema:
                type: object
                properties:
                  policy_name:
                    type: string
                    description: Name of the matched policy, or empty string if default.
                  require_admin:
                    type: boolean
                  min_approvals:
                    type: integer
                    description: Minimum number of approvals required.
                  auto_approve_grace:
                    type: boolean
                    description: Whether grace-period auto-approve is eligible.
                  time_window_ok:
                    type: boolean
                    description: Whether the current time falls within the allowed window.
                  allowed_window:
                    type: string
                    description: >
                      Human-readable allowed time window (e.g. "08:00-18:00 Mon-Fri").
                      Only present when the policy defines time restrictions.
                  require_fresh_oidc:
                    type: string
                    description: >
                      Duration string (e.g. "5m") requiring recent OIDC authentication.
                      Only present when set.
                  break_glass_bypass:
                    type: boolean
                    description: Whether break-glass override is allowed. Only present when true.
                  notify_channels:
                    type: array
                    items:
                      type: string
                    description: Notification channels for this policy. Only present when non-empty.
                  host_group:
                    type: string
                    description: Host registry group label. Only present when the host is registered.
        "400":
          description: Missing required query parameters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized (no admin session or valid API secret).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
