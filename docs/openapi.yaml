          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [username, csrf_token, csrf_ts, channel]
              properties:
                username:
                  type: string
                csrf_token:
                  type: string
                csrf_ts:
                  type: string
                channel:
                  type: string
                  description: Name of the channel to test.
      responses:
