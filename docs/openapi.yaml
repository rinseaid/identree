          description: Redirect to OIDC login if not authenticated.

  /signout:
    post:
      operationId: signOut
      summary: Sign out and clear session cookie
      tags: [Dashboard]
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [csrf_token, csrf_ts]
              properties:
                csrf_token:
                  type: string
                csrf_ts:
                  type: string
      responses:
        "303":
          description: Redirect to login page.

  /theme:
    get:
      operationId: themeToggle
      summary: Set theme preference cookie
      tags: [Dashboard]
      parameters:
        - name: set
          in: query
          required: true
          schema:
            type: string
            enum: [dark, light, system]
        - name: from
          in: query
          schema:
            type: string
      responses:
        "303":
          description: Redirect back to referring page.

  /sessions/login:
    get:
      operationId: sessionsLogin
      summary: Initiate OIDC login flow
      tags: [Dashboard]
      responses:
        "303":
          description: Redirect to OIDC provider.

  /callback:
    get:
      operationId: oidcCallback
      summary: OIDC authorization code callback
      tags: [Dashboard]
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "303":
          description: Redirect to dashboard or approval page on success.
        "403":
          description: Invalid state, expired nonce, or auth failure.

  /approve/{code}:
    get:
      operationId: approvalPage
      summary: Approval page for a challenge (by user code)
      tags: [Dashboard]
      security:
        - sessionCookie: []
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: HTML approval page.
          content:
            text/html: {}
        "303":
          description: Redirect to login if not authenticated.
        "404":
