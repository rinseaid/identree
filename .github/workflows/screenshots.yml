name: Screenshots

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshots:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build Docker image
        run: docker build -t identree:test .
        env:
          COMMIT: ${{ github.sha }}
          VERSION: ci

      - name: Start PocketID
        run: docker compose -f test/docker-compose.yml up -d pocketid
        env:
          COMMIT: ${{ github.sha }}
          VERSION: ci

      - name: Wait for PocketID to be healthy
        run: |
          echo "Waiting for PocketID..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:1411/healthz >/dev/null 2>&1; then
              echo "PocketID ready."
              break
            fi
            echo "  attempt $i/30..."
            sleep 3
          done
          curl -sf http://localhost:1411/healthz || { echo "PocketID never became healthy"; exit 1; }

      - name: Create OIDC client in PocketID
        run: |
          RESP=$(curl -sf -X POST http://localhost:1411/api/oidc/clients \
            -H "Content-Type: application/json" \
            -H "X-API-KEY: identree-test-static-key" \
            -d '{
              "name": "identree",
              "callbackURLs": ["http://localhost:8090/callback"],
              "logoutCallbackURLs": ["http://localhost:8090/"],
              "isPublic": false
            }')
          echo "OIDC client response: $RESP"
          CLIENT_ID=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['id'])")
          CLIENT_SECRET=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['secret'])")
          echo "OIDC_CLIENT_ID=$CLIENT_ID" >> "$GITHUB_ENV"
          echo "OIDC_CLIENT_SECRET=$CLIENT_SECRET" >> "$GITHUB_ENV"
          echo "Created OIDC client id=$CLIENT_ID"

      - name: Start identree
        run: docker compose -f test/docker-compose.yml up -d identree
        env:
          COMMIT: ${{ github.sha }}
          VERSION: ci

      - name: Wait for identree to be healthy
        run: |
          echo "Waiting for identree..."
          for i in $(seq 1 40); do
            if curl -sf http://localhost:8090/healthz >/dev/null 2>&1; then
              echo "identree ready."
              break
            fi
            echo "  attempt $i/40..."
            sleep 3
          done
          curl -sf http://localhost:8090/healthz || { echo "identree never became healthy"; exit 1; }

      - name: Seed test data
        run: bash ci/seed-data.sh

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Playwright + Chromium
        run: |
          npm init -y
          npm install @playwright/test
          npx playwright install chromium --with-deps

      - name: Take screenshots
        run: node ci/screenshots.mjs

      - name: Install Pillow
        run: pip install Pillow

      - name: Generate diagonal-split composites
        run: python ci/diagonal-split.py

      - name: Commit screenshots to repo
        run: |
          mkdir -p docs/screenshots
          cp screenshots/*-split.png docs/screenshots/ 2>/dev/null || true
          cp screenshots/hero.png docs/screenshots/ 2>/dev/null || true
          # Activate the inline image in README once the file exists
          sed -i 's|<!-- hero screenshot committed by CI on each push: docs/screenshots/hero.png -->|![UI overview — light/dark split composites](docs/screenshots/hero.png)|' README.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/screenshots/ README.md
          git diff --cached --quiet || git commit -m "Update UI screenshots [skip ci]"
          git pull --rebase
          git push

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: ui-screenshots
          path: screenshots/
          retention-days: 30
