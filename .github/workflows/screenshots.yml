name: Screenshots

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  screenshots:
    runs-on: ubuntu-latest
    # Skip when the triggering commit is itself a screenshots update to break
    # the push-merge-push loop.
    if: "!startsWith(github.event.head_commit.message, 'Update UI screenshots')"

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26"

      - name: Build Docker image
        run: docker build -t identree:test .
        env:
          COMMIT: ${{ github.sha }}
          VERSION: ci

      - name: Start services
        run: docker compose -f test/docker-compose.yml up -d pocketid identree testclient
        env:
          COMMIT: ${{ github.sha }}
          VERSION: ci

      - name: Wait for PocketID to be healthy
        run: |
          echo "Waiting for PocketID..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:1411/healthz >/dev/null 2>&1; then
              echo "PocketID ready."
              break
            fi
            echo "  attempt $i/30..."
            sleep 3
          done
          curl -sf http://localhost:1411/healthz || { echo "PocketID never became healthy"; exit 1; }

      - name: Wait for identree to be healthy
        run: |
          echo "Waiting for identree..."
          for i in $(seq 1 40); do
            if curl -sf http://localhost:8090/healthz >/dev/null 2>&1; then
              echo "identree ready."
              break
            fi
            echo "  attempt $i/40..."
            sleep 3
          done
          curl -sf http://localhost:8090/healthz || { echo "identree never became healthy"; exit 1; }

      - name: Wait for testclient to be ready
        run: |
          echo "Waiting for testclient..."
          for i in $(seq 1 20); do
            if docker exec identree-test-client test -f /etc/identree/client.conf 2>/dev/null; then
              echo "testclient ready."
              break
            fi
            echo "  attempt $i/20..."
            sleep 3
          done

      - name: Seed test data
        run: bash ci/seed-data.sh

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Install Playwright + Chromium
        run: |
          npm init -y
          npm install @playwright/test
          npx playwright install chromium --with-deps

      - name: Take screenshots
        run: node ci/screenshots.mjs

      - name: Take elevation screenshots
        run: node ci/elevation.mjs

      - name: Install Pillow
        run: pip install Pillow

      - name: Generate diagonal-split composites
        run: python ci/diagonal-split.py

      - name: Commit screenshots to repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SCREENSHOTS_PAT: ${{ secrets.SCREENSHOTS_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Create screenshots branch from current HEAD so it shares history with
          # dev — required for GitHub to allow a PR between them.
          # -B resets the branch to HEAD if it already exists.
          DEST=$(mktemp -d)
          git worktree add -B screenshots "$DEST" HEAD
          mkdir -p "$DEST/docs/screenshots"
          cp screenshots/*-split.png    "$DEST/docs/screenshots/" 2>/dev/null || true
          cp screenshots/elevation-*.png "$DEST/docs/screenshots/" 2>/dev/null || true
          cd "$DEST"
          git add -A docs/screenshots/
          if git diff --cached --quiet; then
            echo "No screenshot changes."
            exit 0
          fi
          git commit -m "Update UI screenshots (from ${{ github.sha }})"
          # Push via PAT so GitHub fires a pull_request:synchronize event on PR #1,
          # which triggers the CI workflow — GITHUB_TOKEN pushes are silently suppressed.
          git remote set-url origin "https://x-access-token:${SCREENSHOTS_PAT}@github.com/${{ github.repository }}"
          git push origin screenshots --force
          # Open a PR screenshots → dev if one doesn't exist yet; enable auto-merge
          # so it lands as soon as the required status checks pass on the PR.
          gh pr create \
            --repo "${{ github.repository }}" \
            --base "${{ github.ref_name }}" \
            --head screenshots \
            --title "chore: update UI screenshots" \
            --body "Automated screenshot update triggered by ${{ github.sha }}." \
            || true
          gh pr merge \
            --repo "${{ github.repository }}" \
            --auto --squash screenshots \
            || true
          # Explicitly trigger CI on the screenshots branch so the required check
          # run exists on its HEAD commit (GITHUB_TOKEN pushes don't fire
          # pull_request events, so we can't rely on those to start CI).
          # Uses SCREENSHOTS_PAT because GITHUB_TOKEN can't dispatch other workflows.
          GH_TOKEN="${SCREENSHOTS_PAT}" gh workflow run ci.yml \
            --repo "${{ github.repository }}" \
            --ref screenshots \
            || true

      - name: Upload screenshots
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ui-screenshots
          path: screenshots/
          retention-days: 30
