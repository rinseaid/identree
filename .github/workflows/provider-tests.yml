name: Provider Integration Tests

on:
  push:
    branches: [dev, main]
    paths:
      - "test/providers/**"
      - "test/testclient/**"
      - "Dockerfile"
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
  pull_request:
    branches: [dev, main]
    paths:
      - "test/providers/**"
      - "test/testclient/**"
      - "Dockerfile"
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
  workflow_dispatch:
    inputs:
      provider:
        description: "Provider to test (lldap-dex | keycloak | kanidm | vault-escrow | infisical-escrow | openldap-dex | authentik | samba-ad-dex | all)"
        required: false
        default: "all"

# Only run one workflow per branch at a time; cancel superseded runs.
concurrency:
  group: provider-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── lldap + Dex ─────────────────────────────────────────────────────────────
  lldap-dex:
    name: lldap + Dex (bridge mode)
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.provider == 'all' ||
      github.event.inputs.provider == 'lldap-dex'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start lldap+Dex environment
        run: make test-lldap-dex
        env:
          COMMIT: ${{ github.sha }}
          VERSION: ${{ github.ref_name }}

      - name: Wait for all services to be healthy
        run: |
          echo "Waiting for identree-lldap-dex-server..."
          timeout 120 bash -c 'until curl -sf http://localhost:8091/healthz; do sleep 3; done'
          echo "All services healthy."

      - name: Run setup (create users/groups in lldap)
        run: make test-lldap-dex-setup

      - name: Wait for sssd to populate
        run: |
          echo "Waiting for sssd group membership..."
          timeout 60 bash -c 'until docker exec identree-lldap-dex-client id alice 2>/dev/null | grep -q developers; do sleep 3; done'
          # Prime user cache so group member DNs resolve during validate
          docker exec identree-lldap-dex-client bash -c \
            "getent passwd alice bob testadmin >/dev/null 2>&1; sss_cache -G 2>/dev/null; getent group developers admins >/dev/null 2>&1" || true
          echo "sssd ready."

      - name: Validate environment
        run: make test-lldap-dex-validate

      - name: Capture logs on failure
        if: failure()
        run: |
          echo "=== lldap logs ==="
          docker logs identree-lldap-dex-lldap 2>&1 | tail -50
          echo "=== dex logs ==="
          docker logs identree-lldap-dex-dex 2>&1 | tail -50
          echo "=== identree logs ==="
          docker logs identree-lldap-dex-server 2>&1 | tail -50
          echo "=== testclient sssd.conf ==="
          docker exec identree-lldap-dex-client cat /etc/sssd/sssd.conf 2>/dev/null || true
          echo "=== testclient sssd logs ==="
          docker exec identree-lldap-dex-client journalctl -u sssd 2>/dev/null || \
            docker exec identree-lldap-dex-client cat /var/log/sssd/sssd.log 2>/dev/null || true

      - name: Tear down
        if: always()
        run: make test-lldap-dex-down

  # ── Keycloak + lldap ────────────────────────────────────────────────────────
  keycloak:
    name: Keycloak + lldap (bridge mode)
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.provider == 'all' ||
      github.event.inputs.provider == 'keycloak'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start Keycloak environment
        run: make test-keycloak
        env:
          COMMIT: ${{ github.sha }}
          VERSION: ${{ github.ref_name }}

      - name: Wait for Keycloak to be ready
        # Keycloak start-dev takes longer than other providers
        run: |
          echo "Waiting for Keycloak..."
          timeout 180 bash -c 'until curl -sf http://localhost:8180/health/ready; do sleep 5; done'
          echo "Waiting for identree..."
          timeout 60 bash -c 'until curl -sf http://localhost:8092/healthz; do sleep 3; done'
          echo "All services healthy."

      - name: Run setup (Keycloak realm + lldap users)
        id: setup
        run: |
          bash test/providers/keycloak/setup.sh | tee /tmp/keycloak-setup.log
          # Extract the generated client secret
          SECRET=$(grep 'client_secret:' /tmp/keycloak-setup.log | awk '{print $NF}' || echo "")
          echo "client_secret=${SECRET}" >> "$GITHUB_OUTPUT"

      - name: Restart identree with Keycloak client secret
        if: steps.setup.outputs.client_secret != ''
        run: |
          KEYCLOAK_CLIENT_SECRET="${{ steps.setup.outputs.client_secret }}" \
          docker compose -f test/providers/keycloak/docker-compose.yml up -d identree
          timeout 60 bash -c 'until curl -sf http://localhost:8092/healthz; do sleep 3; done'

      - name: Wait for sssd to populate
        run: |
          echo "Waiting for sssd group membership..."
          timeout 60 bash -c 'until docker exec identree-keycloak-client id alice 2>/dev/null | grep -q developers; do sleep 3; done'
          docker exec identree-keycloak-client bash -c \
            "getent passwd alice bob testadmin >/dev/null 2>&1; sss_cache -G 2>/dev/null; getent group developers admins >/dev/null 2>&1" || true
          echo "sssd ready."

      - name: Validate environment
        run: make test-keycloak-validate

      - name: Capture logs on failure
        if: failure()
        run: |
          echo "=== Keycloak logs ==="
          docker logs identree-keycloak-server 2>&1 | tail -80
          echo "=== identree logs ==="
          docker logs identree-keycloak-identree 2>&1 | tail -50
          echo "=== lldap logs ==="
          docker logs identree-keycloak-lldap 2>&1 | tail -30

      - name: Tear down
        if: always()
        run: make test-keycloak-down

  # ── Kanidm ──────────────────────────────────────────────────────────────────
  kanidm:
    name: Kanidm (bridge mode)
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.provider == 'all' ||
      github.event.inputs.provider == 'kanidm'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start Kanidm environment
        run: make test-kanidm
        env:
          COMMIT: ${{ github.sha }}
          VERSION: ${{ github.ref_name }}

      - name: Wait for Kanidm to be ready
        # Kanidm runs a DB integrity check at startup; allow up to 10 min total.
        run: |
          echo "Waiting for Kanidm (HTTPS) — docker healthcheck polls /proc/net/tcp..."
          timeout 600 bash -c 'until curl -skf https://localhost:8443/status 2>/dev/null; do sleep 5; done'
          echo "Kanidm ready."
          echo "Waiting for identree..."
          timeout 60 bash -c 'until curl -sf http://localhost:8093/healthz; do sleep 3; done'
          echo "All services healthy."

      - name: Run setup (Kanidm OAuth2 client + users + groups)
        id: setup
        run: |
          bash test/providers/kanidm/setup.sh | tee /tmp/kanidm-setup.log
          SECRET=$(grep 'client_secret:' /tmp/kanidm-setup.log | awk '{print $NF}' || echo "")
          echo "client_secret=${SECRET}" >> "$GITHUB_OUTPUT"

      - name: Restart identree with Kanidm client secret
        if: steps.setup.outputs.client_secret != ''
        run: |
          KANIDM_CLIENT_SECRET="${{ steps.setup.outputs.client_secret }}" \
          docker compose -f test/providers/kanidm/docker-compose.yml up -d identree
          timeout 60 bash -c 'until curl -sf http://localhost:8093/healthz; do sleep 3; done'

      - name: Wait for sssd to populate
        run: |
          echo "Waiting for sssd group membership..."
          timeout 60 bash -c 'until docker exec identree-kanidm-client id alice 2>/dev/null | grep -q developers; do sleep 3; done'
          docker exec identree-kanidm-client bash -c \
            "getent passwd alice bob testadmin >/dev/null 2>&1; sss_cache -G 2>/dev/null; getent group developers admins >/dev/null 2>&1" || true
          echo "sssd ready."

      - name: Validate environment
        run: make test-kanidm-validate

      - name: Capture logs on failure
        if: failure()
        run: |
          echo "=== Kanidm logs ==="
          docker logs identree-kanidm-server 2>&1 | tail -80
          echo "=== identree logs ==="
          docker logs identree-kanidm-identree 2>&1 | tail -50
          echo "=== testclient sssd.conf ==="
          docker exec identree-kanidm-client cat /etc/sssd/sssd.conf 2>/dev/null || true

      - name: Tear down
        if: always()
        run: make test-kanidm-down

  # ── Vault escrow ─────────────────────────────────────────────────────────────
  vault-escrow:
    name: Vault escrow (KV v2)
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.provider == 'all' ||
      github.event.inputs.provider == 'vault-escrow'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start Vault escrow environment
        run: make test-vault-escrow
        env:
          COMMIT: ${{ github.sha }}
          VERSION: ${{ github.ref_name }}

      - name: Wait for all services to be healthy
        run: |
          echo "Waiting for Vault..."
          timeout 60 bash -c 'until curl -sf http://localhost:8200/v1/sys/health; do sleep 3; done'
          echo "Waiting for identree..."
          timeout 120 bash -c 'until curl -sf http://localhost:8094/healthz; do sleep 3; done'
          echo "All services healthy."

      - name: Run setup (lldap users/groups + Vault verification)
        run: make test-vault-escrow-setup

      - name: Wait for sssd to populate
        run: |
          echo "Waiting for sssd group membership..."
          timeout 60 bash -c 'until docker exec identree-vault-escrow-client id alice 2>/dev/null | grep -q developers; do sleep 3; done'
          docker exec identree-vault-escrow-client bash -c \
            "getent passwd alice bob testadmin >/dev/null 2>&1; sss_cache -G 2>/dev/null; getent group developers admins >/dev/null 2>&1" || true
          echo "sssd ready."

      - name: Validate environment
        run: make test-vault-escrow-validate

      - name: Check break-glass secret written to Vault
        run: |
          echo "=== Vault secret at secret/data/identree/vault-escrow-test-host ==="
          curl -sf http://localhost:8200/v1/secret/data/identree/vault-escrow-test-host \
            -H "X-Vault-Token: identree-vault-test-token" | python3 -m json.tool || \
          echo "Secret not yet present — rotate-breakglass may not have run."

      - name: Capture logs on failure
        if: failure()
        run: |
          echo "=== lldap logs ==="
          docker logs identree-vault-escrow-lldap 2>&1 | tail -30
          echo "=== dex logs ==="
          docker logs identree-vault-escrow-dex 2>&1 | tail -30
          echo "=== vault logs ==="
          docker logs identree-vault-escrow-vault 2>&1 | tail -50
          echo "=== identree logs ==="
          docker logs identree-vault-escrow-server 2>&1 | tail -50
          echo "=== testclient sssd.conf ==="
          docker exec identree-vault-escrow-client cat /etc/sssd/sssd.conf 2>/dev/null || true

      - name: Tear down
        if: always()
        run: make test-vault-escrow-down

  # ── Infisical escrow ──────────────────────────────────────────────────────────
  infisical-escrow:
    name: Infisical escrow (Secrets Manager)
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.provider == 'all' ||
      github.event.inputs.provider == 'infisical-escrow'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start Infisical escrow environment
        run: make test-infisical-escrow
        env:
          COMMIT: ${{ github.sha }}
          VERSION: ${{ github.ref_name }}

      - name: Wait for all services to be healthy
        # Infisical takes longer — it needs postgres migrations to complete before serving.
        run: |
          echo "Waiting for Infisical..."
          timeout 180 bash -c 'until curl -sf http://localhost:8095/api/status; do sleep 5; done'
          echo "Waiting for identree (first start, escrow creds not yet set)..."
          timeout 120 bash -c 'until curl -sf http://localhost:8096/healthz; do sleep 3; done'
          echo "All services healthy."

      - name: Run setup (lldap users + Infisical workspace + machine identity)
        run: make test-infisical-escrow-setup

      - name: Wait for sssd to populate
        run: |
          echo "Waiting for sssd group membership..."
          timeout 60 bash -c 'until docker exec identree-infisical-escrow-client id alice 2>/dev/null | grep -q developers; do sleep 3; done'
          docker exec identree-infisical-escrow-client bash -c \
            "getent passwd alice bob testadmin >/dev/null 2>&1; sss_cache -G 2>/dev/null; getent group developers admins >/dev/null 2>&1" || true
          echo "sssd ready."

      - name: Validate environment
        run: make test-infisical-escrow-validate

      - name: Capture logs on failure
        if: failure()
        run: |
          echo "=== infisical logs ==="
          docker logs identree-infisical-escrow-infisical 2>&1 | tail -80
          echo "=== identree logs ==="
          docker logs identree-infisical-escrow-server 2>&1 | tail -50
          echo "=== lldap logs ==="
          docker logs identree-infisical-escrow-lldap 2>&1 | tail -30
          echo "=== postgres logs ==="
          docker logs identree-infisical-escrow-postgres 2>&1 | tail -20
          echo "=== testclient sssd.conf ==="
          docker exec identree-infisical-escrow-client cat /etc/sssd/sssd.conf 2>/dev/null || true

      - name: Tear down
        if: always()
        run: make test-infisical-escrow-down

  # ── OpenLDAP + Dex ────────────────────────────────────────────────────────────
  openldap-dex:
    name: OpenLDAP + Dex (RFC 2307)
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.provider == 'all' ||
      github.event.inputs.provider == 'openldap-dex'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start OpenLDAP+Dex environment
        run: make test-openldap-dex
        env:
          COMMIT: ${{ github.sha }}
          VERSION: ${{ github.ref_name }}

      - name: Wait for all services to be healthy
        run: |
          echo "Waiting for OpenLDAP..."
          timeout 90 bash -c 'until docker exec identree-openldap-dex-ldap ldapsearch -H ldap://localhost:389 -x -b "dc=test,dc=local" -s base dn 2>/dev/null | grep -q dn; do sleep 3; done'
          echo "Waiting for Dex..."
          timeout 60 bash -c 'until curl -sf http://localhost:5559/dex/healthz; do sleep 3; done'
          echo "Waiting for identree..."
          timeout 120 bash -c 'until curl -sf http://localhost:8097/healthz; do sleep 3; done'
          echo "All services healthy."

      - name: Run setup (set user passwords via ldappasswd)
        run: make test-openldap-dex-setup

      - name: Wait for sssd to populate
        run: |
          echo "Waiting for sssd group membership..."
          timeout 60 bash -c 'until docker exec identree-openldap-dex-client id alice 2>/dev/null | grep -q developers; do sleep 3; done'
          docker exec identree-openldap-dex-client bash -c \
            "getent passwd alice bob testadmin >/dev/null 2>&1; sss_cache -G 2>/dev/null; getent group developers admins >/dev/null 2>&1" || true
          echo "sssd ready."

      - name: Validate environment
        run: make test-openldap-dex-validate

      - name: Capture logs on failure
        if: failure()
        run: |
          echo "=== openldap logs ==="
          docker logs identree-openldap-dex-ldap 2>&1 | tail -50
          echo "=== dex logs ==="
          docker logs identree-openldap-dex-dex 2>&1 | tail -30
          echo "=== identree logs ==="
          docker logs identree-openldap-dex-server 2>&1 | tail -50
          echo "=== testclient sssd.conf ==="
          docker exec identree-openldap-dex-client cat /etc/sssd/sssd.conf 2>/dev/null || true
          echo "=== testclient sssd logs ==="
          docker exec identree-openldap-dex-client cat /var/log/sssd/sssd_LDAP.log 2>/dev/null | tail -30 || true

      - name: Tear down
        if: always()
        run: make test-openldap-dex-down

  # ── Authentik ─────────────────────────────────────────────────────────────────
  authentik:
    name: Authentik (OIDC + LDAP outpost)
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.provider == 'all' ||
      github.event.inputs.provider == 'authentik'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start Authentik environment
        run: make test-authentik
        env:
          COMMIT: ${{ github.sha }}
          VERSION: ${{ github.ref_name }}

      - name: Wait for Authentik to be healthy
        # Authentik needs postgres migrations + worker startup before the API is ready
        run: |
          echo "Waiting for Authentik server..."
          timeout 180 bash -c 'until curl -sf http://localhost:9000/-/health/live/; do sleep 5; done'
          echo "Waiting for Authentik API (flows ready)..."
          timeout 120 bash -c 'until curl -sf http://localhost:9000/api/v3/flows/instances/ -H "Authorization: Bearer identree-authentik-test-token" 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); exit(0 if len(d.get(\"results\",[]))>0 else 1)" 2>/dev/null; do sleep 5; done'
          echo "Authentik ready."

      - name: Run setup (users, groups, OIDC provider, LDAP outpost)
        run: make test-authentik-setup

      - name: Wait for LDAP outpost to connect and sssd to populate
        run: |
          echo "Waiting for sssd group membership..."
          timeout 60 bash -c 'until docker exec identree-authentik-client id alice 2>/dev/null | grep -q developers; do sleep 3; done'
          docker exec identree-authentik-client bash -c \
            "getent passwd alice bob testadmin >/dev/null 2>&1; sss_cache -G 2>/dev/null; getent group developers admins >/dev/null 2>&1" || true
          echo "sssd ready."

      - name: Wait for identree to be healthy after restart
        run: timeout 60 bash -c 'until curl -sf http://localhost:8098/healthz; do sleep 3; done'

      - name: Validate environment
        run: make test-authentik-validate

      - name: Capture logs on failure
        if: failure()
        run: |
          echo "=== authentik-server logs ==="
          docker logs identree-authentik-server 2>&1 | tail -80
          echo "=== authentik-worker logs ==="
          docker logs identree-authentik-worker 2>&1 | tail -30
          echo "=== authentik-ldap logs ==="
          docker logs identree-authentik-ldap 2>&1 | tail -50
          echo "=== identree logs ==="
          docker logs identree-authentik-server-app 2>&1 | tail -50
          echo "=== testclient sssd.conf ==="
          docker exec identree-authentik-client cat /etc/sssd/sssd.conf 2>/dev/null || true
          echo "=== testclient sssd logs ==="
          docker exec identree-authentik-client cat /var/log/sssd/sssd_LDAP.log 2>/dev/null | tail -30 || true

      - name: Tear down
        if: always()
        run: make test-authentik-down

  # ── Samba AD DC + Dex ─────────────────────────────────────────────────────────
  samba-ad-dex:
    name: Samba AD DC + Dex (AD schema)
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.provider == 'all' ||
      github.event.inputs.provider == 'samba-ad-dex'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start Samba AD DC + Dex environment
        run: make test-samba-ad-dex
        env:
          COMMIT: ${{ github.sha }}
          VERSION: ${{ github.ref_name }}

      - name: Wait for Samba AD DC to be ready
        # Samba AD DC runs samba-tool domain provision on first start (~30-60s).
        run: |
          echo "Waiting for Samba AD DC..."
          timeout 180 bash -c 'until docker exec identree-samba-ad-dex-dc samba-tool domain info 127.0.0.1 >/dev/null 2>&1; do sleep 5; done'
          echo "Waiting for Dex..."
          timeout 60 bash -c 'until curl -sf http://localhost:5560/dex/healthz; do sleep 3; done'
          echo "Waiting for identree..."
          timeout 120 bash -c 'until curl -sf http://localhost:8099/healthz; do sleep 3; done'
          echo "All services healthy."

      - name: Run setup (create users and groups in Samba AD)
        run: make test-samba-ad-dex-setup

      - name: Wait for sssd to populate
        run: |
          echo "Waiting for sssd group membership..."
          timeout 60 bash -c 'until docker exec identree-samba-ad-dex-client id alice 2>/dev/null | grep -q developers; do sleep 3; done'
          docker exec identree-samba-ad-dex-client bash -c \
            "getent passwd alice bob testadmin >/dev/null 2>&1; sss_cache -G 2>/dev/null; getent group developers admins >/dev/null 2>&1" || true
          echo "sssd ready."

      - name: Validate environment
        run: make test-samba-ad-dex-validate

      - name: Capture logs on failure
        if: failure()
        run: |
          echo "=== samba logs ==="
          docker logs identree-samba-ad-dex-dc 2>&1 | tail -80
          echo "=== dex logs ==="
          docker logs identree-samba-ad-dex-dex 2>&1 | tail -30
          echo "=== identree logs ==="
          docker logs identree-samba-ad-dex-server 2>&1 | tail -50
          echo "=== testclient sssd.conf ==="
          docker exec identree-samba-ad-dex-client cat /etc/sssd/sssd.conf 2>/dev/null || true
          echo "=== testclient sssd logs ==="
          docker exec identree-samba-ad-dex-client cat /var/log/sssd/sssd_LDAP.log 2>/dev/null | tail -30 || true

      - name: Tear down
        if: always()
        run: make test-samba-ad-dex-down
