# Dex OIDC configuration for the lldap+Dex test environment.
# Dex acts as the OIDC provider; lldap is its LDAP identity backend.
#
# Dex binds to lldap using admin credentials for directory searches.
# User authentication: Dex presents a login form; the user enters their
# lldap credentials; Dex binds to lldap as that user to verify the password.
# Successful auth issues an OIDC token with uid + group membership claims.

issuer: http://dex:5556/dex

storage:
  type: memory

web:
  http: 0.0.0.0:5556

logger:
  level: "info"
  format: "text"

oauth2:
  skipApprovalScreen: true
  responseTypes:
    - code

# ── lldap LDAP connector ───────────────────────────────────────────────────────
# lldap uses groupOfUniqueNames with uniqueMember (full DNs) — rfc2307bis style.
# userMatchers.userAttr=DN means Dex matches the user's DN against the
# uniqueMember values in each group entry.
connectors:
  - type: ldap
    id: lldap
    name: lldap
    config:
      host: lldap:3890
      insecureNoSSL: true
      insecureSkipVerify: true

      # Admin bind for directory searches
      bindDN: uid=admin,ou=people,dc=test,dc=local
      bindPW: lldap-admin-pass

      userSearch:
        baseDN: ou=people,dc=test,dc=local
        filter: "(objectClass=inetOrgPerson)"
        username: uid
        idAttr: uid
        emailAttr: mail
        nameAttr: cn

      groupSearch:
        baseDN: ou=groups,dc=test,dc=local
        filter: "(objectClass=groupOfUniqueNames)"
        userMatchers:
          - userAttr: DN
            groupAttr: uniqueMember
        nameAttr: cn

# ── identree OIDC client ───────────────────────────────────────────────────────
staticClients:
  - id: identree
    secret: identree-dex-secret
    name: identree (lldap+Dex test)
    redirectURIs:
      - http://identree:8090/callback
      - http://localhost:8091/callback
