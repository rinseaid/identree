# Dex OIDC configuration for the Vault escrow test environment.
# Identical in structure to the lldap-dex provider test, but with
# ports and redirect URIs scoped to the vault-escrow environment.

issuer: http://dex:5556/dex

storage:
  type: memory

web:
  http: 0.0.0.0:5556

logger:
  level: "info"
  format: "text"

oauth2:
  skipApprovalScreen: true
  responseTypes:
    - code

# ── lldap LDAP connector ───────────────────────────────────────────────────────
connectors:
  - type: ldap
    id: lldap
    name: lldap
    config:
      host: lldap:3890
      insecureNoSSL: true
      insecureSkipVerify: true

      bindDN: uid=admin,ou=people,dc=test,dc=local
      bindPW: lldap-admin-pass

      userSearch:
        baseDN: ou=people,dc=test,dc=local
        filter: "(objectClass=inetOrgPerson)"
        username: uid
        idAttr: uid
        emailAttr: mail
        nameAttr: cn

      groupSearch:
        baseDN: ou=groups,dc=test,dc=local
        filter: "(objectClass=groupOfUniqueNames)"
        userMatchers:
          - userAttr: DN
            groupAttr: uniqueMember
        nameAttr: cn

# ── identree OIDC client ───────────────────────────────────────────────────────
staticClients:
  - id: identree
    secret: identree-dex-secret
    name: identree (vault-escrow test)
    redirectURIs:
      - http://identree:8090/callback
      - http://localhost:8094/callback
