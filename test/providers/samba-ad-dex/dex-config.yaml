# Dex OIDC configuration for the Samba AD DC + Dex test environment.
# Dex acts as the OIDC provider; Samba AD is its LDAP identity backend.
#
# Key AD specifics vs other LDAP providers:
#   - Username attribute: sAMAccountName (not uid/cn)
#   - User objectClass:  user (AD-specific; also matches computers — excluded by filter)
#   - Group objectClass: group (AD-specific)
#   - Group membership:  member attribute containing full user DNs
#   - Dex binds as Administrator for directory searches.

issuer: http://dex:5556/dex

storage:
  type: memory

web:
  http: 0.0.0.0:5556

logger:
  level: "info"
  format: "text"

oauth2:
  skipApprovalScreen: true
  responseTypes:
    - code

# ── Samba AD LDAP connector ───────────────────────────────────────────────────
connectors:
  - type: ldap
    id: samba-ad
    name: Samba AD
    config:
      host: samba:389
      insecureNoSSL: true
      insecureSkipVerify: true

      bindDN: "CN=Administrator,CN=Users,DC=samba,DC=test,DC=local"
      bindPW: "Admin@samba1"

      userSearch:
        baseDN: "CN=Users,DC=samba,DC=test,DC=local"
        # Exclude computer accounts; sAMAccountName holds the login name.
        filter: "(&(objectClass=user)(!(objectClass=computer)))"
        username: sAMAccountName
        idAttr: sAMAccountName
        emailAttr: mail
        nameAttr: cn

      groupSearch:
        baseDN: "CN=Users,DC=samba,DC=test,DC=local"
        filter: "(objectClass=group)"
        # member contains full user DNs — match against the user's DN.
        userMatchers:
          - userAttr: DN
            groupAttr: member
        nameAttr: sAMAccountName

# ── identree OIDC client ──────────────────────────────────────────────────────
staticClients:
  - id: identree
    secret: identree-dex-secret
    name: identree (Samba AD + Dex test)
    redirectURIs:
      - http://identree:8090/callback
      - http://localhost:8099/callback
