services:
  # Generate a CA + server TLS certificate pair for Kanidm before it starts.
  # Kanidm 1.9+ requires TLS; the certs are only for test environments.
  #
  # We generate a proper CA cert (CA:TRUE) and a leaf server cert (CA:FALSE)
  # signed by that CA, so that rustls in kanidm/tools:latest accepts the
  # server cert as a valid leaf cert (rustls rejects self-signed CA:TRUE certs
  # presented as leaf certs with CaUsedAsEndEntity).
  #
  #   /certs/ca.crt    — CA cert; trust anchor for kanidm/tools client
  #   /certs/server.crt — leaf server cert; presented by kanidmd
  #   /certs/server.key — private key for server cert
  init-certs:
    image: alpine:3.19
    container_name: identree-kanidm-init-certs
    volumes:
      - kanidm-certs:/certs
    command:
      - sh
      - -c
      - >-
        apk add -q --no-cache openssl &&
        openssl genrsa -out /certs/ca.key 2048 &&
        openssl req -x509 -new -nodes -key /certs/ca.key -sha256 -days 3650 -out /certs/ca.crt -subj '/CN=kanidm-test-ca' &&
        openssl genrsa -out /certs/server.key 2048 &&
        openssl req -new -key /certs/server.key -out /certs/server.csr -subj '/CN=kanidm' &&
        printf 'basicConstraints=critical,CA:FALSE\nsubjectAltName=DNS:kanidm,DNS:localhost\nkeyUsage=digitalSignature,keyEncipherment\nextendedKeyUsage=serverAuth\n' > /tmp/ext.cnf &&
        openssl x509 -req -in /certs/server.csr -CA /certs/ca.crt -CAkey /certs/ca.key -CAcreateserial -out /certs/server.crt -days 3650 -sha256 -extfile /tmp/ext.cnf
    restart: "no"

  kanidm:
    image: docker.io/kanidm/server:latest
    container_name: identree-kanidm-server
    restart: unless-stopped
    depends_on:
      init-certs:
        condition: service_completed_successfully
    # Mount our server.toml and the generated TLS certificate.
    volumes:
      - ./server.toml:/data/server.toml:ro
      - kanidm-data:/data
      - kanidm-certs:/certs:ro
    ports:
      - "127.0.0.1:8443:8443"    # OIDC / admin UI (HTTPS)
      - "127.0.0.1:3636:3636"    # LDAP (LDAPS with TLS)
    healthcheck:
      # kanidm/server is a minimal Debian image with no curl/wget.
      # Port 8443 (0x20FB) is listening when the server is ready; check via
      # /proc/net/tcp6 (IPv4-mapped) which is always available on Linux.
      # Kanidm 1.9 runs a full DB integrity check before binding — allow 18min.
      test: ["CMD-SHELL", "grep -q ':20FB ' /proc/net/tcp6 2>/dev/null || grep -q ':20FB ' /proc/net/tcp 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 90
      start_period: 180s

  identree:
    build:
      context: ../../..
      dockerfile: Dockerfile
      args:
        COMMIT: ${COMMIT:-dev}
        VERSION: ${VERSION:-dev}
    container_name: identree-kanidm-identree
    restart: unless-stopped
    depends_on:
      kanidm:
        condition: service_healthy
    environment:
      # OIDC — Kanidm per-client issuer URL format: <origin>/oauth2/openid/<client_name>
      # Internal: identree fetches discovery from the Docker-internal hostname (HTTPS).
      # Public: the iss claim in tokens uses origin from server.toml (localhost HTTPS).
      # InsecureIssuerURLContext allows the iss/fetch mismatch in test environments.
      # InsecureSkipVerify skips TLS verification for the self-signed cert.
      IDENTREE_OIDC_ISSUER_URL: "https://kanidm:8443/oauth2/openid/identree-test"
      IDENTREE_OIDC_ISSUER_PUBLIC_URL: "https://localhost:8443/oauth2/openid/identree-test"
      IDENTREE_OIDC_CLIENT_ID: "identree-test"
      # Client secret set by setup.sh — supply via env or update after running setup
      IDENTREE_OIDC_CLIENT_SECRET: "${KANIDM_CLIENT_SECRET:-}"
      IDENTREE_OIDC_INSECURE_SKIP_VERIFY: "true"

      # Server
      IDENTREE_EXTERNAL_URL: "http://localhost:8093"
      IDENTREE_INSTALL_URL: "http://identree:8090"
      IDENTREE_SHARED_SECRET: "test-shared-secret-kanidm-1234567"

      # Bridge mode — Kanidm serves LDAP; identree only handles PAM challenges
      IDENTREE_LDAP_ENABLED: "false"
      IDENTREE_ADMIN_GROUPS: "admins"
      IDENTREE_DEV_LOGIN: "false"

      IDENTREE_CHALLENGE_TTL: "120s"
      IDENTREE_GRACE_PERIOD: "24h"

      IDENTREE_TOML_CONFIG_FILE: "/data/config.toml"
      IDENTREE_ESCROW_BACKEND: "local"
      IDENTREE_ESCROW_ENCRYPTION_KEY: "d47fc5b3b6bff6bbfb75d1bf1420ffb8e4202826e7bb339292895d24bbb3b630"
      IDENTREE_SESSION_STATE_FILE: "/data/sessions.json"
    volumes:
      - identree-data:/data
    ports:
      - "127.0.0.1:8093:8090"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8090/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  testclient:
    build:
      context: ../../..
      dockerfile: test/testclient/Dockerfile
    container_name: identree-kanidm-client
    hostname: kanidm-test-host
    restart: unless-stopped
    depends_on:
      identree:
        condition: service_healthy
      kanidm:
        condition: service_healthy
    environment:
      # Kanidm LDAP — rfc2307bis with posixaccount/posixgroup objectClasses.
      # Users appear at: spn=username@domain,dc=kanidm,dc=test,dc=local
      # Kanidm's base DN is derived from the domain in server.toml: dc=test,dc=local
      # With TLS required (Kanidm 1.9+), the LDAP port uses LDAPS (implicit TLS).
      # Kanidm domain="localhost" → LDAP base DN is dc=localhost (single-label).
      LDAP_URI: "ldaps://kanidm:3636"
      LDAP_BASE: "dc=localhost"
      SSSD_SCHEMA: "rfc2307bis"
      SSSD_USER_OBJECT_CLASS: "posixaccount"
      SSSD_GROUP_OBJECT_CLASS: "posixgroup"
      SSSD_GROUP_MEMBER_ATTR: "member"
      LDAP_USER_SEARCH_BASE: "dc=localhost"
      LDAP_GROUP_SEARCH_BASE: "dc=localhost"

      SSSD_FALLBACK_HOMEDIR: "/home/%u"
      SSSD_SUDO_PROVIDER: "none"
      STATIC_SUDO_RULES: "alice ALL=(ALL) ALL;bob ALL=(ALL) ALL;testadmin ALL=(ALL) ALL"

      IDENTREE_SERVER_URL: "http://identree:8090"
      IDENTREE_INSECURE_ALLOW_HTTP_ESCROW: "true"
      IDENTREE_SHARED_SECRET: "test-shared-secret-kanidm-1234567"
    cap_add:
      - NET_ADMIN
    command: ["sleep", "infinity"]

volumes:
  kanidm-data:
  kanidm-certs:
  identree-data:
