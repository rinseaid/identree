# Kanidm server configuration for the identree test environment.
# Runs with TLS using a self-signed certificate generated by the init-certs
# service in docker-compose.yml.  Test/dev only — do NOT use in production.
#
# Kanidm 1.9+ requires TLS; plain HTTP mode was removed.
# The self-signed cert is at /certs/server.crt / /certs/server.key (volume-mounted).

bindaddress    = "0.0.0.0:8443"
ldapbindaddress = "0.0.0.0:3636"

tls_chain = "/certs/server.crt"
tls_key   = "/certs/server.key"

# origin is the public-facing URL — it appears as the iss claim in OIDC tokens
# and in LDAP referrals.  Must be reachable from the browser.
# identree uses IDENTREE_OIDC_ISSUER_PUBLIC_URL=https://localhost:8443/... to
# match this, and IDENTREE_OIDC_ISSUER_URL=https://kanidm:8443/... for
# server-side discovery (InsecureIssuerURLContext bridges the gap).
origin = "https://localhost:8443"
domain = "test.local"

db_path     = "/data/kanidm.db"
db_arc_size = 2048

log_level = "info"
