# Keycloak SAML-to-OIDC bridge test environment.
#
# Architecture:
#   keycloak-idp    = "Enterprise SAML IdP" (holds users alice, bob, testadmin)
#   keycloak-bridge = "OIDC-to-SAML bridge" (accepts SAML from idp, exposes OIDC to identree)
#   identree        = speaks OIDC only (connects to keycloak-bridge)
#
# This proves the SAML bridge architecture works end-to-end:
# a SAML IdP's users are accessible to identree via pure OIDC.

services:
  lldap:
    image: lldap/lldap:stable
    container_name: identree-saml-bridge-lldap
    restart: unless-stopped
    environment:
      LLDAP_JWT_SECRET: "lldap-saml-bridge-test-jwt-secret"
      LLDAP_KEY_SEED: "lldap-saml-bridge-test-key-seed"
      LLDAP_LDAP_BASE_DN: "dc=test,dc=local"
      LLDAP_LDAP_USER_DN: "admin"
      LLDAP_LDAP_USER_PASS: "lldap-admin-pass"
      LLDAP_HTTP_URL: "http://lldap:17170"
    volumes:
      - lldap-data:/data
    ports:
      - "127.0.0.1:17175:17170"
      - "127.0.0.1:3895:3890"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:17170/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # The "enterprise SAML IdP" -- holds users and exposes a SAML IdP endpoint.
  keycloak-idp:
    image: quay.io/keycloak/keycloak:latest
    container_name: identree-saml-bridge-idp
    restart: unless-stopped
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    volumes:
      - idp-data:/opt/keycloak/data
    ports:
      - "127.0.0.1:8183:8080"
    healthcheck:
      test: ["CMD-SHELL", "grep -q ':1F90 ' /proc/net/tcp6 2>/dev/null || grep -q ':1F90 ' /proc/net/tcp 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  # The "OIDC-to-SAML bridge" -- accepts SAML from keycloak-idp, exposes OIDC to identree.
  keycloak-bridge:
    image: quay.io/keycloak/keycloak:latest
    container_name: identree-saml-bridge-bridge
    restart: unless-stopped
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    volumes:
      - bridge-data:/opt/keycloak/data
    ports:
      - "127.0.0.1:8184:8080"
    healthcheck:
      test: ["CMD-SHELL", "grep -q ':1F90 ' /proc/net/tcp6 2>/dev/null || grep -q ':1F90 ' /proc/net/tcp 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  identree:
    build:
      context: ../../..
      dockerfile: Dockerfile
      args:
        COMMIT: ${COMMIT:-dev}
        VERSION: ${VERSION:-dev}
    container_name: identree-saml-bridge-identree
    restart: unless-stopped
    depends_on:
      keycloak-bridge:
        condition: service_healthy
    environment:
      # OIDC -- points at the bridge, not the IdP.
      IDENTREE_OIDC_ISSUER_URL: "http://keycloak-bridge:8080/realms/bridge"
      IDENTREE_OIDC_ISSUER_PUBLIC_URL: "http://localhost:8184/realms/bridge"
      IDENTREE_OIDC_CLIENT_ID: "identree"
      IDENTREE_OIDC_CLIENT_SECRET: "${BRIDGE_CLIENT_SECRET:-}"

      IDENTREE_EXTERNAL_URL: "http://localhost:8095"
      IDENTREE_INSTALL_URL: "http://identree:8090"
      IDENTREE_SHARED_SECRET: "test-shared-secret-saml-bridge-12345"

      IDENTREE_LDAP_ENABLED: "false"
      IDENTREE_ADMIN_GROUPS: "admins"
      IDENTREE_DEV_LOGIN: "false"

      IDENTREE_CHALLENGE_TTL: "120s"
      IDENTREE_GRACE_PERIOD: "24h"

      IDENTREE_TOML_CONFIG_FILE: "/data/config.toml"
      IDENTREE_ESCROW_BACKEND: "local"
      IDENTREE_ESCROW_ENCRYPTION_KEY: "c36eb4a2a5fae5afef64c0ae0319eea7d3191715d6af228181784c13afa2a520"
      IDENTREE_SESSION_STATE_FILE: "/data/sessions.json"
    volumes:
      - identree-data:/data
    ports:
      - "127.0.0.1:8095:8090"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8090/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  testclient:
    build:
      context: ../../..
      dockerfile: test/testclient/Dockerfile
    container_name: identree-saml-bridge-client
    hostname: saml-bridge-test-host
    restart: unless-stopped
    depends_on:
      identree:
        condition: service_healthy
      lldap:
        condition: service_healthy
    environment:
      LDAP_URI: "ldap://lldap:3890"
      LDAP_BASE: "dc=test,dc=local"
      LDAP_BIND_DN: "uid=admin,ou=people,dc=test,dc=local"
      LDAP_BIND_PW: "lldap-admin-pass"
      SSSD_SCHEMA: "rfc2307bis"
      SSSD_USER_OBJECT_CLASS: "inetOrgPerson"
      SSSD_GROUP_OBJECT_CLASS: "groupOfUniqueNames"
      SSSD_GROUP_MEMBER_ATTR: "uniqueMember"
      SSSD_SUDO_PROVIDER: "none"
      STATIC_SUDO_RULES: "alice ALL=(ALL) ALL;bob ALL=(ALL) ALL;testadmin ALL=(ALL) ALL"
      IDENTREE_SERVER_URL: "http://identree:8090"
      IDENTREE_INSECURE_ALLOW_HTTP_ESCROW: "true"
      IDENTREE_SHARED_SECRET: "test-shared-secret-saml-bridge-12345"
    cap_add:
      - NET_ADMIN
    command: ["sleep", "infinity"]

volumes:
  lldap-data:
  idp-data:
  bridge-data:
  identree-data:
