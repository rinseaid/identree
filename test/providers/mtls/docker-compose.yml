# mTLS test environment — validates the full mTLS flow:
#   1. identree generates a CA at startup
#   2. provision endpoint issues a client cert for the testclient hostname
#   3. PAM client authenticates using the client cert (no shared secret)
#
# The identree server listens on HTTPS (self-signed server cert) so that Go's
# http.Server populates r.TLS.PeerCertificates for client cert verification.
services:
  pocketid:
    image: ghcr.io/pocket-id/pocket-id:latest
    container_name: identree-mtls-pocketid
    restart: unless-stopped
    environment:
      APP_URL: "http://localhost:1415"
      ENCRYPTION_KEY: "identree-mtls-test-key-1234"
      STATIC_API_KEY: "identree-mtls-test-static-key"
      APP_ENV: production
      DISABLE_RATE_LIMITING: "true"
    volumes:
      - pocketid-data:/app/data
    ports:
      - "127.0.0.1:1415:1411"
    healthcheck:
      test: ["CMD", "/app/pocket-id", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  identree:
    build:
      context: ../../..
      dockerfile: Dockerfile
      args:
        COMMIT: ${COMMIT:-dev}
        VERSION: ${VERSION:-dev}
    container_name: identree-mtls-server
    restart: unless-stopped
    depends_on:
      pocketid:
        condition: service_healthy
      init-tls:
        condition: service_completed_successfully
    environment:
      IDENTREE_OIDC_ISSUER_URL: "http://pocketid:1411"
      IDENTREE_OIDC_ISSUER_PUBLIC_URL: "http://localhost:1415"
      IDENTREE_OIDC_CLIENT_ID: "${OIDC_CLIENT_ID:-mtls-test-placeholder}"
      IDENTREE_OIDC_CLIENT_SECRET: "${OIDC_CLIENT_SECRET:-mtls-test-placeholder-secret}"
      IDENTREE_POCKETID_API_KEY: "identree-mtls-test-static-key"
      IDENTREE_POCKETID_API_URL: "http://pocketid:1411"
      IDENTREE_EXTERNAL_URL: "https://localhost:8094"
      IDENTREE_INSTALL_URL: "https://identree:8090"
      # SharedSecret is needed for initial provision (bootstrap before mTLS)
      IDENTREE_SHARED_SECRET: "mtls-test-shared-secret-1234567890abc"
      IDENTREE_LDAP_ENABLED: "true"
      IDENTREE_LDAP_LISTEN_ADDR: ":3389"
      IDENTREE_LDAP_TLS_LISTEN_ADDR: ":3636"
      IDENTREE_LDAP_BASE_DN: "dc=test,dc=local"
      IDENTREE_LDAP_REFRESH_INTERVAL: "30s"
      IDENTREE_LDAP_PROVISION_ENABLED: "true"
      IDENTREE_LDAP_EXTERNAL_URL: "ldaps://identree:3636"
      IDENTREE_TOML_CONFIG_FILE: "/data/config.toml"
      IDENTREE_ESCROW_BACKEND: "local"
      IDENTREE_ESCROW_ENCRYPTION_KEY: "a15da2f0f3efd3feddd42a8fc8107cde5c1969593c4fd016069562a01dfd0f30"
      IDENTREE_SESSION_STATE_FILE: "/data/sessions.json"
      IDENTREE_LDAP_UID_MAP_FILE: "/data/uidmap.json"
      IDENTREE_SUDO_RULES_FILE: "/data/sudorules.json"
      IDENTREE_ADMIN_GROUPS: "admins"
      IDENTREE_DEV_LOGIN: "false"
      IDENTREE_CHALLENGE_TTL: "120s"
      IDENTREE_GRACE_PERIOD: "24h"
      # ── mTLS configuration ──
      IDENTREE_MTLS_CA_CERT: "/config/mtls-ca.crt"
      IDENTREE_MTLS_CA_KEY: "/config/mtls-ca.key"
      IDENTREE_MTLS_CERT_TTL: "8760h"
      # ── TLS server cert (generated by setup.sh init-container) ──
      IDENTREE_TLS_CERT_FILE: "/config/server.crt"
      IDENTREE_TLS_KEY_FILE: "/config/server.key"
    volumes:
      - identree-data:/data
      - identree-config:/config
    ports:
      - "127.0.0.1:8094:8090"
      - "127.0.0.1:3394:3389"
      - "127.0.0.1:3636:3636"
    healthcheck:
      # Server listens on HTTPS — use wget with --no-check-certificate
      test: ["CMD", "wget", "--spider", "-q", "--no-check-certificate", "https://localhost:8090/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # init-tls generates a self-signed server certificate before identree starts.
  # It writes to the shared identree-config volume.
  init-tls:
    image: debian:bookworm-slim
    container_name: identree-mtls-init-tls
    volumes:
      - identree-config:/config
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        apt-get update -qq && apt-get install -y -qq openssl >/dev/null 2>&1
        # Ensure /config is writable by identree user (uid 999)
        chown 999:999 /config
        # Generate self-signed server cert for identree (valid for localhost + identree hostname)
        if [ ! -f /config/server.crt ]; then
          openssl req -x509 -newkey ec -pkeyopt ec_paramgen_curve:P-256 \
            -keyout /config/server.key -out /config/server.crt \
            -days 365 -nodes \
            -subj "/CN=identree" \
            -addext "subjectAltName=DNS:identree,DNS:localhost,IP:127.0.0.1" 2>/dev/null
          chown 999:999 /config/server.key /config/server.crt
          chmod 644 /config/server.crt
          chmod 640 /config/server.key
          echo "TLS server cert generated."
        else
          echo "TLS server cert already exists, skipping."
        fi
        # Do NOT pre-create mtls-ca.crt/key — LoadOrGenerateCA will create them.
        # The directory is writable by identree (uid 999) so it can write the files.

  testclient:
    build:
      context: ../../..
      dockerfile: test/testclient/Dockerfile
    container_name: identree-mtls-client
    hostname: mtls-test-host-01
    restart: unless-stopped
    depends_on:
      identree:
        condition: service_healthy
    environment:
      LDAP_URI: "ldaps://identree:3636"
      LDAP_BASE: "dc=test,dc=local"
      # Initial provision uses HTTP to the provision endpoint (shared secret).
      # After setup.sh runs, the client switches to mTLS over HTTPS.
      IDENTREE_SERVER_URL: "http://identree:8090"
      IDENTREE_INSECURE_ALLOW_HTTP_ESCROW: "true"
      IDENTREE_SHARED_SECRET: "mtls-test-shared-secret-1234567890abc"
    cap_add:
      - NET_ADMIN
    command: ["sleep", "infinity"]

volumes:
  pocketid-data:
  identree-data:
  identree-config:
