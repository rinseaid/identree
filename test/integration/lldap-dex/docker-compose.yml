# Integration test: lldap + Dex bridge mode with 5 multi-OS hosts.
# Ports: lldap-ui=17175, ldap=3411, dex=5561, identree=8111
# Start:  make integration-lldap-dex
# Setup:  make integration-lldap-dex-setup
# Run:    make integration-lldap-dex-run
services:
  lldap:
    image: lldap/lldap:stable
    container_name: integ-lldap-dex-lldap
    restart: unless-stopped
    environment:
      LLDAP_JWT_SECRET: "integ-lldap-dex-jwt-secret"
      LLDAP_KEY_SEED: "integ-lldap-dex-key-seed"
      LLDAP_LDAP_BASE_DN: "dc=integ,dc=local"
      LLDAP_LDAP_USER_DN: "admin"
      LLDAP_LDAP_USER_PASS: "lldap-integ-admin-pass"
      LLDAP_HTTP_URL: "http://lldap:17170"
    volumes:
      - lldap-data:/data
    ports:
      - "127.0.0.1:17175:17170"
      - "127.0.0.1:3411:3890"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:17170/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  dex:
    image: dexidp/dex:v2.41.0
    container_name: integ-lldap-dex-dex
    restart: unless-stopped
    depends_on:
      lldap:
        condition: service_healthy
    volumes:
      - ./dex-config.yaml:/etc/dex/config.yaml:ro
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    ports:
      - "127.0.0.1:5561:5556"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5556/dex/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: valkey/valkey:8
    container_name: integ-lldap-dex-redis
    ports:
      - "127.0.0.1:6381:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Audit sink: Grafana Loki
  loki:
    image: grafana/loki:3.0.0
    container_name: integ-lldap-dex-loki
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "127.0.0.1:3161:3100"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  identree:
    build:
      context: ../../..
      dockerfile: Dockerfile
      args:
        COMMIT: ${COMMIT:-dev}
        VERSION: ${VERSION:-dev}
    container_name: integ-lldap-dex-identree
    restart: unless-stopped
    depends_on:
      dex:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      IDENTREE_OIDC_ISSUER_URL: "http://dex:5556/dex"
      IDENTREE_OIDC_ISSUER_PUBLIC_URL: "http://localhost:5561/dex"
      IDENTREE_OIDC_CLIENT_ID: "identree"
      IDENTREE_OIDC_CLIENT_SECRET: "identree-integ-dex-secret"
      IDENTREE_EXTERNAL_URL: "http://localhost:8111"
      IDENTREE_INSTALL_URL: "http://identree:8090"
      IDENTREE_SHARED_SECRET: "integ-lldap-dex-shared-secret-xyz"
      IDENTREE_LDAP_ENABLED: "false"
      IDENTREE_ADMIN_GROUPS: "admins"
      IDENTREE_DEV_LOGIN: "true"
      IDENTREE_CHALLENGE_TTL: "120s"
      IDENTREE_GRACE_PERIOD: "24h"
      IDENTREE_TOML_CONFIG_FILE: "/data/config.toml"
      IDENTREE_ESCROW_BACKEND: "local"
      IDENTREE_ESCROW_ENCRYPTION_KEY: "d37fc5f3f6gfe6gfef75dbfe0a42afff8e4191826e7ff339292895d24ffe3f52"
      IDENTREE_SESSION_STATE_FILE: "/data/sessions.json"
      # State backend: Redis (Valkey)
      IDENTREE_STATE_BACKEND: "redis"
      IDENTREE_REDIS_URL: "redis://redis:6379/0"
      IDENTREE_REDIS_KEY_PREFIX: "integ-lldap-dex:"
      # Audit: Loki push
      IDENTREE_AUDIT_LOKI_URL: "http://loki:3100"
    volumes:
      - identree-data:/data
    ports:
      - "127.0.0.1:8111:8090"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8090/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ── Host containers ────────────────────────────────────────────────────────

  host-ubuntu2204:
    build:
      context: ../../..
      dockerfile: test/integration/hosts/Dockerfile.ubuntu2204
    container_name: integ-lldap-dex-ubuntu2204
    hostname: dev-ubuntu22-01
    restart: unless-stopped
    depends_on:
      identree:
        condition: service_healthy
      lldap:
        condition: service_healthy
    environment:
      LDAP_URI: "ldap://lldap:3890"
      LDAP_BASE: "dc=integ,dc=local"
      LDAP_BIND_DN: "uid=admin,ou=people,dc=integ,dc=local"
      LDAP_BIND_PW: "lldap-integ-admin-pass"
      SSSD_SCHEMA: "rfc2307bis"
      SSSD_USER_OBJECT_CLASS: "inetOrgPerson"
      SSSD_GROUP_OBJECT_CLASS: "groupOfUniqueNames"
      SSSD_GROUP_MEMBER_ATTR: "uniqueMember"
      SSSD_SUDO_PROVIDER: "none"
      STATIC_SUDO_RULES: "alice ALL=(ALL) ALL;bob ALL=(ALL) ALL;carol ALL=(ALL) ALL;dave ALL=(ALL) ALL;erin ALL=(ALL) ALL;frank ALL=(ALL) ALL;grace ALL=(ALL) ALL;henry ALL=(ALL) ALL;iris ALL=(ALL) ALL;jack ALL=(ALL) ALL;kate ALL=(ALL) ALL;liam ALL=(ALL) ALL;mia ALL=(ALL) ALL;noah ALL=(ALL) ALL;olivia ALL=(ALL) ALL;paul ALL=(ALL) ALL;quinn ALL=(ALL) ALL;rose ALL=(ALL) ALL;steve ALL=(ALL) ALL;theo ALL=(ALL) ALL;sam ALL=(ALL) ALL;tina ALL=(ALL) ALL;ursula ALL=(ALL) ALL;victor ALL=(ALL) ALL;wendy ALL=(ALL) ALL"
      IDENTREE_SERVER_URL: "http://identree:8090"
      IDENTREE_INSECURE_ALLOW_HTTP_ESCROW: "true"
      IDENTREE_SHARED_SECRET: "integ-lldap-dex-shared-secret-xyz"
    cap_add:
      - NET_ADMIN
    command: ["sleep", "infinity"]

